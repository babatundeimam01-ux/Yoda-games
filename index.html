<!DOCTYPE bhtml>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Yoda games</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <nav>
            <h1>Yoda games</h1>
            <input id="search" type="text" placeholder="search Games">
        </nav>
        <header class="hero">
            <h2>Moblie app</h2>
            <p>Instant Play, No Downloads, Powered by GameMonetize Feed</p>
        </header>
        <section class="categories">
            <button onclick="filterCategory('ALL')">All</button> 
            <button onclick="filterCategory('Car racing')">Racing</button>
            <button onclick="filterCategory('Football')">Puzzles</button>
            <button onclick="filterCategory('Arcade')">Arcade</button>
            <button onclick="filterCategory('Car shooting')">Shooting</button>
            <button onclick="filterCategory('Soccer')">Soccer</button> 
        </section>
        <main id="gameContainer" class="grid"></main>
    
        <script src="js/app.js"></script>
    </body>       
</html>
